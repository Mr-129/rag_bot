<!doctype html>
<html lang="ja">
  <head>
    <!-- 文字コードとレスポンシブ設定 -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local LLM Chat</title>
    <!-- 画面レイアウト用CSS -->
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <!-- アプリ全体を縦3分割（ヘッダー / チャット / 入力欄）するコンテナ -->
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <h1>Local LLM Chat</h1>
          <div class="hint">/api/chat（同一オリジン）</div>
        </div>

        <!-- 右上の設定パネル（開閉式） -->
        <div class="top-actions">
          <details class="settings">
            <summary>設定</summary>
            <div class="settings-panel">
              <label>
                モデル
                <input id="model" type="text" value="gemma3:4b" />
              </label>

              <label class="inline">
                <span>RAG</span>
                <input id="rag" type="checkbox" checked />
              </label>

              <label>
                Top-K
                <input id="topk" type="number" min="1" max="10" value="2" />
              </label>

              <label>
                回答モード
                <select id="mode">
                  <option value="general" selected>general（汎用）</option>
                  <option value="strict">strict（RAGのみ）</option>
                  <option value="hybrid">hybrid（RAG＋参考情報）</option>
                </select>
              </label>

              <label>
                検索モード
                <select id="retrievalMode">
                  <option value="hybrid3" selected>hybrid3（キーワード+Embedding）</option>
                  <option value="hybrid">hybrid（TF-IDF+BM25）</option>
                  <option value="tfidf">TF-IDF</option>
                  <option value="bm25">BM25</option>
                </select>
              </label>

              <button id="clear" type="button">履歴をクリア</button>
            </div>
          </details>
        </div>
      </header>

      <!-- チャット表示領域。aria-live="polite" は新着メッセージを支援技術へ穏やかに通知する -->
      <main id="chat" class="chat" aria-live="polite"></main>

      <!-- 下部固定の入力エリア -->
      <section class="composer-wrap">
        <textarea id="message" placeholder="メッセージを入力（Enterで送信 / Shift+Enterで改行）"></textarea>
        <div class="composer-actions">
          <div id="status" class="status"></div>
          <button id="send" type="button">送信</button>
        </div>
      </section>
    </div>

    <!-- Markdown描画とサニタイズ（XSS対策） -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <!-- チャット画面の挙動（送信・描画・状態制御） -->
    <script src="/static/app.js" defer></script>
  </body>
</html>
